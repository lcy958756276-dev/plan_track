# map
global_frame: map
map_type: costmap
origin_z: 0.0
z_resolution: 1
z_voxels: 2
publish_voxel_map: false
transform_tolerance: 0.5
meter_scoring: true

# robot base
robot_base_frame: base_footprint
footprint: [[-0.1, -0.3], [-0.1, 0.3], [0.8, 0.3], [0.8, -0.3]]
footprint_padding: 0.1

update_frequency: 2.0
publish_frequency: 1.0
transform_tolerance: 0.5
cost_scaling_factor:  2.0
inflation_radius: 0.0

### Sensor management parameters ###
obstacle_layer:
  observation_sources: scan scan_real
  scan: {
    topic:                    scan_fixed,
    sensor_frame:             base_scan,
    observation_persistence:  0.0,
    expected_update_rate:     0.8,
    data_type:                LaserScan,
    clearing:                 true,
    marking:                  true,
    max_obstacle_height:      0.8,
    min_obstacle_height:      0.0,
    obstacle_range:           2.5,
    raytrace_range:           3.0,
    inf_is_valid:             true
  }
  scan_real: {
    topic:                    scan_real,
    sensor_frame:             base_scan,
    observation_persistence:  0.0,
    expected_update_rate:     5.0,
    data_type:                LaserScan,
    clearing:                 true,
    marking:                  true,
    max_obstacle_height:      0.8,
    min_obstacle_height:      0.0,
    obstacle_range:           10.0,
    raytrace_range:           10.0,
    inf_is_valid:             true
  }

inflation_layer:
  enabled:              true
  cost_scaling_factor:  2.0
  inflation_radius:     0.0

static_map:
  enabled:              true
  clear_time:           20
  publish_static_map:   true
